schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
context: |
  Tech stack: Electron, TypeScript, React, Vite, Vitest, and Node.js.
  Architecture: renderer state lives in Zustand; Electron IPC bridges local build,
  simulation, catalog file access, and Codex CLI process calls.
  AI integration: Codex CLI uses the learner's ChatGPT login, the app-configured
  Codex model default, screenshot context, scoped Circuitiny tools, and explicit
  reasoning effort.
  Domain: beginner electronics learning for ESP32 circuits, DRC explanations,
  generated ESP-IDF code, build/flash, simulation, and catalog-backed parts.
  Conventions: keep UI dense and tool-like, prefer typed helpers, validate with
  pnpm typecheck, pnpm test, pnpm build, and openspec validate.
